services:
  postgres:
    image: postgres:16-alpine
    container_name: influencer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-influencer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-influencer_secret}
      POSTGRES_DB: ${POSTGRES_DB:-influencer_intel}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-influencer} -d ${POSTGRES_DB:-influencer_intel}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: influencer-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-influencer}:${POSTGRES_PASSWORD:-influencer_secret}@postgres:5432/${POSTGRES_DB:-influencer_intel}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001}
      COLLECTION_MAX_CONCURRENCY: ${COLLECTION_MAX_CONCURRENCY:-10}
      COLLECTION_MAX_CONCURRENCY_PER_USER: ${COLLECTION_MAX_CONCURRENCY_PER_USER:-3}
      COLLECTION_MAX_CONCURRENCY_PER_PLATFORM: ${COLLECTION_MAX_CONCURRENCY_PER_PLATFORM:-3}
      # API 内嵌 worker；若只用独立 collection-worker 服务，可设为 0
      COLLECTION_WORKER_COUNT: ${COLLECTION_WORKER_COUNT:-4}
      COLLECTION_API_EMBEDDED_WORKER_ENABLED: ${COLLECTION_API_EMBEDDED_WORKER_ENABLED:-false}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    # Windows 卷挂载会覆盖 entrypoint 脚本且 CRLF 会导致 exec 失败，改用内联 sh
    # 首次启动后需 seed：docker compose exec api python -m app.scripts.seed
    # 或设置 RUN_SEED=true 自动 seed（仅空库时生效）

  collection-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: influencer-collection-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-influencer}:${POSTGRES_PASSWORD:-influencer_secret}@postgres:5432/${POSTGRES_DB:-influencer_intel}
      COLLECTION_MAX_CONCURRENCY: ${COLLECTION_MAX_CONCURRENCY:-10}
      COLLECTION_MAX_CONCURRENCY_PER_USER: ${COLLECTION_MAX_CONCURRENCY_PER_USER:-3}
      COLLECTION_MAX_CONCURRENCY_PER_PLATFORM: ${COLLECTION_MAX_CONCURRENCY_PER_PLATFORM:-3}
      COLLECTION_WORKER_COUNT: ${COLLECTION_STANDALONE_WORKER_COUNT:-4}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    # 独立 worker 进程池（与 API 内嵌 pool 并行时靠 DB SKIP LOCKED 防重复领取）
    entrypoint: ["./docker-entrypoint.sh"]
    command: ["python", "-m", "app.workers.collection_worker"]

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:8000}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api-proxy}
        NEXT_PUBLIC_LONG_RUNNING_API_URL: ${NEXT_PUBLIC_LONG_RUNNING_API_URL:-/api-long}
    container_name: influencer-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_LONG_RUNNING_API_URL: ${NEXT_PUBLIC_LONG_RUNNING_API_URL:-/api-long}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
