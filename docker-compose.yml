services:
  postgres:
    image: postgres:16-alpine
    container_name: influencer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-influencer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-influencer_secret}
      POSTGRES_DB: ${POSTGRES_DB:-influencer_intel}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-influencer} -d ${POSTGRES_DB:-influencer_intel}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: influencer-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-influencer}:${POSTGRES_PASSWORD:-influencer_secret}@postgres:5432/${POSTGRES_DB:-influencer_intel}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    # Windows 卷挂载会覆盖 entrypoint 脚本且 CRLF 会导致 exec 失败，改用内联 sh
    # 首次启动后需 seed：docker compose exec api python -m app.scripts.seed
    # 或设置 RUN_SEED=true 自动 seed（仅空库时生效）

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: influencer-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:
