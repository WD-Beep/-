<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>定制旅行背包报价中台 - 管理员登录</title>
    <link rel="stylesheet" href="/static/admin/admin.css" />
  </head>
  <body class="login-page">
    <div class="login-shell">
      <aside class="login-hero" aria-hidden="true">
        <div class="login-hero-bg"></div>
        <div class="login-hero-grid"></div>
        <div class="login-hero-glow login-hero-glow-a"></div>
        <div class="login-hero-glow login-hero-glow-b"></div>

        <svg class="login-pack-outline" viewBox="0 0 280 320" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
            opacity="0.35"
            d="M92 118h96c12 0 22 10 22 22v118c0 12-10 22-22 22H92c-12 0-22-10-22-22V140c0-12 10-22 22-22z"
          />
          <path
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            opacity="0.28"
            d="M118 118V96c0-22 18-40 40-40s40 18 40 40v22M108 156h76M108 188h76"
          />
          <path
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            opacity="0.22"
            d="M76 200l-24 42M212 200l24 42"
          />
        </svg>

        <div class="login-hero-content">
          <div class="login-brand">
            <span class="login-brand-mark" aria-hidden="true">旅</span>
            <div class="login-brand-text">
              <span class="login-brand-name">定制旅行背包报价中台</span>
              <span class="login-brand-sub">Outdoor gear · Structured quoting</span>
            </div>
          </div>

          <p class="login-tagline">
            把 <strong>BOM 解析、结构报价、版本归档</strong> 放进同一个后台，方便复盘每一份报价。
          </p>

          <div class="login-pills">
            <span class="login-pill">结构化算价</span>
            <span class="login-pill">版本可追踪</span>
            <span class="login-pill">团队协同</span>
          </div>

          <ul class="login-highlights">
            <li>
              <span class="login-hl-dot"></span>
              <span>BOM、物料、工艺和数量集中归档，减少手工翻表。</span>
            </li>
            <li>
              <span class="login-hl-dot"></span>
              <span>报价记录支持筛选、查看和导出，便于后续对账。</span>
            </li>
            <li>
              <span class="login-hl-dot"></span>
              <span>价格知识库和异常反馈统一维护，报价越用越顺手。</span>
            </li>
          </ul>
        </div>
      </aside>

      <main class="login-main">
        <div class="login-main-inner">
          <header class="login-card-head">
            <p class="login-welcome">欢迎回来</p>
            <h1 class="login-title">管理员登录</h1>
            <p class="login-desc">使用授权账号进入后台，管理报价归档与价格知识库。</p>
          </header>

          <form id="loginForm" class="login-form login-form-pro" novalidate>
            <label class="field field-pro" id="fieldUsername">
              <span class="field-label-pro">账号</span>
              <div class="login-input-shell">
                <span class="login-input-icon" aria-hidden="true">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                      d="M12 11a3 3 0 100-6 3 3 0 000 6z"
                      stroke="currentColor"
                      stroke-width="1.75"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <path
                      d="M5 21v-1c0-3.5 3.5-6 7-6s7 2.5 7 6v1"
                      stroke="currentColor"
                      stroke-width="1.75"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>
                </span>
                <input
                  id="inputUsername"
                  type="text"
                  name="username"
                  autocomplete="username"
                  placeholder="请输入管理员账号"
                  required
                  aria-required="true"
                />
              </div>
            </label>

            <label class="field field-pro" id="fieldPassword">
              <span class="field-label-pro">密码</span>
              <div class="login-input-shell">
                <span class="login-input-icon" aria-hidden="true">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                      d="M7 11V8a5 5 0 0110 0v3"
                      stroke="currentColor"
                      stroke-width="1.75"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <rect
                      x="5"
                      y="11"
                      width="14"
                      height="11"
                      rx="2"
                      stroke="currentColor"
                      stroke-width="1.75"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <circle cx="12" cy="16.5" r="1.25" fill="currentColor" />
                  </svg>
                </span>
                <input
                  id="inputPassword"
                  type="password"
                  name="password"
                  autocomplete="current-password"
                  placeholder="请输入密码"
                  required
                  aria-required="true"
                />
              </div>
            </label>

            <p id="loginError" class="error login-error" role="alert" hidden></p>

            <button type="submit" class="btn-login-submit" id="loginSubmit">
              <span class="btn-login-spinner" aria-hidden="true"></span>
              <span class="btn-login-text">登录</span>
              <span class="btn-login-loading" hidden>登录中...</span>
            </button>
          </form>

          <p class="login-foot">仅限授权管理员使用 · 请勿在公共设备保存密码</p>
        </div>
      </main>
    </div>

    <script>
      const form = document.getElementById("loginForm");
      const errEl = document.getElementById("loginError");
      const btn = document.getElementById("loginSubmit");
      const btnText = btn.querySelector(".btn-login-text");
      const btnLoad = btn.querySelector(".btn-login-loading");
      const fieldUser = document.getElementById("fieldUsername");
      const fieldPass = document.getElementById("fieldPassword");
      const inputUser = document.getElementById("inputUsername");
      const inputPass = document.getElementById("inputPassword");

      function clearFieldErrors() {
        fieldUser.classList.remove("field-pro--error");
        fieldPass.classList.remove("field-pro--error");
        inputUser.removeAttribute("aria-invalid");
        inputPass.removeAttribute("aria-invalid");
      }

      function setFieldErrors() {
        fieldUser.classList.add("field-pro--error");
        fieldPass.classList.add("field-pro--error");
        inputUser.setAttribute("aria-invalid", "true");
        inputPass.setAttribute("aria-invalid", "true");
      }

      function setLoading(loading) {
        btn.disabled = loading;
        btn.classList.toggle("is-loading", loading);
        btn.setAttribute("aria-busy", loading ? "true" : "false");
        btnText.hidden = loading;
        btnLoad.hidden = !loading;
      }

      form.querySelectorAll("input").forEach((inp) => {
        inp.addEventListener("input", () => {
          errEl.hidden = true;
          clearFieldErrors();
        });
      });

      async function apiJson(url, opts = {}) {
        const res = await fetch(url, {
          credentials: "same-origin",
          headers: { "Content-Type": "application/json", ...(opts.headers || {}) },
          ...opts,
        });
        const text = await res.text();
        let data = {};
        try {
          data = text ? JSON.parse(text) : {};
        } catch {
          data = {};
        }
        return { ok: res.ok, status: res.status, data };
      }

      form.addEventListener("submit", async (ev) => {
        ev.preventDefault();
        errEl.hidden = true;
        clearFieldErrors();
        const fd = new FormData(form);
        const username = String(fd.get("username") || "").trim();
        const password = String(fd.get("password") || "");

        setLoading(true);
        try {
          const { ok, status, data } = await apiJson("/admin-api/login", {
            method: "POST",
            body: JSON.stringify({ username, password }),
          });
          if (!ok || status === 401 || data.ok === false) {
            errEl.textContent = "账号或密码不正确";
            errEl.hidden = false;
            setFieldErrors();
            return;
          }
          if (data.role !== "admin") {
            errEl.textContent = "当前账号没有管理员权限";
            errEl.hidden = false;
            setFieldErrors();
            return;
          }
          window.location.replace("/admin/quotes");
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
